services:
  # Catalog service containers
  catalog:
    build: ./services/catalog
    depends_on:
      - catalog-mongo
    ports:
      - "3000:3000"
    volumes:
      - ./services/catalog:/app:cached
      - catalog_node_modules:/app/node_modules
    environment:
      - MONGO_URL=mongodb://catalog-mongo:27017/mydatabase1
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}
  catalog-mongo:
    image: mongo:7.0

  # Inventory service containers
  inventory:
    build: ./services/inventory
    depends_on:
      - inventory-mongo
    ports:
      - "4000:4000"
    volumes:
      - ./services/inventory:/services/inventory:cached
      - inventory_node_modules:/services/inventory/node_modules
    environment:
      - MONGO_URL=mongodb://inventory-mongo:27017/mydatabase1
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}
  inventory-mongo:
    image: mongo:7.0

  # PLP BFF
  plp-bff:
    build: ./services/plp-bff
    ports:
      - "5000:5000"
    depends_on:
      - catalog
      - inventory
    volumes:
      - ./services/plp-bff:/app:cached
      - plp_bff_node_modules:/app/node_modules
    environment:
      - CATALOG_URL=http://catalog:3000
      - INVENTORY_URL=http://inventory:4000
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}

  # PLP service container
  product-landing-page:
    build: ./services/product-landing-page
    volumes:
      - ./services/product-landing-page:/html:cached
      - plp_node_modules:/html/node_modules
    ports:
      - "8080:3000"
    depends_on:
      - plp-bff
    environment:
      - REACT_APP_BFF_URL=${REACT_APP_BFF_URL:-http://localhost:5000}

volumes:
    catalog_node_modules:
    inventory_node_modules:
    plp_bff_node_modules:
    plp_node_modules:
