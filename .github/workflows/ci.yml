name: CI

on:
  push:
  pull_request:

jobs:
  catalog-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/catalog/package-lock.json
      

      - name: Install catalog dependencies
        working-directory: services/catalog
        run: npm ci

      - name: Run catalog tests
        working-directory: services/catalog
        run: npm test