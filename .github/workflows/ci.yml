name: CI

on:
  push:
  pull_request:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - services/catalog
          - services/inventory
          - services/product-landing-page

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: npm audit (high and above)
        working-directory: ${{ matrix.path }}
        run: npm audit --audit-level=high

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: catalog
            path: services/catalog
            test: npm test
          - name: inventory
            path: services/inventory
            test: npm test
          - name: product-landing-page
            path: services/product-landing-page
            test: npm test -- --watchAll=false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run tests (${{ matrix.name }})
        working-directory: ${{ matrix.path }}
        env:
          CI: true
        run: ${{ matrix.test }}

  integration-and-e2e:
    runs-on: ubuntu-latest
    needs: [dependency-audit, unit-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            tests/integration/package-lock.json
            tests/e2e/package-lock.json

      - name: Get Playwright node-version
        id: playwright-version 
        working-directory: tests/e2e
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms0playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Start docker-compose stack
        run: docker compose up -d --build

      - name: Run integration tests
        working-directory: tests/integration
        run: |
          npm ci
          npm run test:integration

      - name: Install Playwright + run E2E
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Stop docker-compose stack
        if: always()
        run: docker compose down -v