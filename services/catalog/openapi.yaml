openapi: 3.0.3
info:
  title: Catalog API
  description: API for retrieving product catalog items.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /catalog:
    get:
      summary: List all catalog items
      description: Returns an array of all catalog items.
      operationId: listCatalogItems
      tags:
        - Catalog
      responses:
        "200":
          description: A list of catalog items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogItem"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Too many requests, please try again later
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Internal server error
  /catalog/{sku}:
    get:
      summary: Get catalog item by SKU
      description: Returns a single catalog item matching the given SKU. SKU must be alphanumeric with hyphens, 1-64 characters.
      operationId: getCatalogItemBySku
      tags:
        - Catalog
      parameters:
        - name: sku
          in: path
          required: true
          description: Product SKU (alphanumeric and hyphens, 1-64 characters)
          schema:
            type: string
            pattern: "^[A-Za-z0-9-]{1,64}$"
            minLength: 1
            maxLength: 64
          example: SKU-001
      responses:
        "200":
          description: The catalog item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
        "400":
          description: Invalid SKU format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Invalid SKU format
        "404":
          description: Catalog item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Catalog item not found
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Too many requests, please try again later
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Internal server error
components:
  schemas:
    CatalogItem:
      type: object
      required:
        - sku
        - title
        - price
        - image
      properties:
        sku:
          type: string
          description: Unique product identifier
          example: SKU-001
        title:
          type: string
          description: Product title
          example: Test Product
        price:
          type: number
          format: double
          description: Product price
          example: 29.99
        image:
          type: string
          format: uri
          description: URL to product image
          example: https://example.com/image.jpg
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
